<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Atlántida | Simulador PRO</title>
<link rel="stylesheet" href="simulador.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="header">
        <i class="fas fa-landmark"></i>
        <h1>BANCO <span>ATLÁNTIDA</span></h1>
        <p>EL BANCO QUE HACE REALIDAD TUS SUEÑOS</p>
        <p> SIMULADOR DE CRÉDITO INTELIGENTE</p>
    </header>

    <!-- CARD -->
    <div class="card">

        <div class="input-group">
            <label>INGRESOS</label>
            <input type="number" id="txtIngresos">
            <small class="error" id="errorIngresos"></small>
        </div>

        <div class="input-group">
            <label>EGRESOS</label>
            <input type="number" id="txtEgresos">
            <small class="error" id="errorEgresos"></small>
        </div>

        <div class="input-group">
            <label>MONTO</label>
            <input type="number" id="txtMonto">
            <small class="error" id="errorMonto"></small>
        </div>

        <div class="input-group">
            <label>PLAZO</label>
            <input type="number" id="txtPlazo">
            <small class="error" id="errorPlazo"></small>
        </div>

        <div class="input-group">
            <label>TASA (%)</label>
            <input type="number" id="txtTasaInteres">
            <small class="error" id="errorTasa"></small>
        </div>

        <!-- RESULTADO -->
        <div class="result">

            <h2 id="cuota">$0</h2>
            <p>Cuota mensual</p>

            <div class="progress">
                <div id="barra"></div>
            </div>

            <h3 id="estado">ANALIZANDO...</h3>

        </div>

        <button id="btnCalcular">
            Evaluar crédito
        </button>

    </div>

</div>
        <p> 2026. Banco Atlántida es parte de la Corporación INNOVA </p> 
<script src="funciones.js"></script>
<script src="simulador.js"></script>

</body>
</html>
